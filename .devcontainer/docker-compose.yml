services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    environment:
      # Override .env DATABASE_URL — host uses localhost:5433, container uses db:5432
      DATABASE_URL: postgresql://journiful:journiful_dev@db:5432/journiful
      # Override S3 endpoint — host uses localhost:9000, container uses minio:9000
      AWS_ENDPOINT_URL: http://minio:9000
    volumes:
      - ..:/workspace:cached
      # Isolate node_modules so host and container don't conflict on pnpm store paths.
      # Host runs `pnpm add/install` freely; container syncs via `make test-exec CMD="pnpm install"`.
      - node_modules:/workspace/node_modules
      - api_node_modules:/workspace/apps/api/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - shared_node_modules:/workspace/shared/node_modules
      - pnpm_store:/workspace/.pnpm-store
      # Isolate .next so host and container dev servers don't conflict on lock files.
      - next_cache:/workspace/apps/web/.next
    ports:
      - "3000" # random host port -> container 3000 (Next.js)
      - "8000" # random host port -> container 8000 (Fastify)
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: journiful
      POSTGRES_PASSWORD: journiful_dev
      POSTGRES_DB: journiful
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journiful"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/journiful-uploads &&
      mc anonymous set download local/journiful-uploads &&
      echo 'Bucket ready'
      "

volumes:
  postgres_data:
  minio_data:
  node_modules:
  api_node_modules:
  web_node_modules:
  shared_node_modules:
  pnpm_store:
  next_cache:
